<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="FitLife marca">
  <defs>
    <linearGradient id="mark-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <linearGradient id="mark-fire" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ff6d00"/>
      <stop offset="100%" stop-color="#ff9100"/>
    </linearGradient>
    <filter id="mark-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="30" fill="#0a0e17"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#mark-grad)" stroke-width="1" opacity="0.35"/>
  <!-- Anel externo energia -->
  <path d="M32 6a26 26 0 0 1 22.5 13" fill="none" stroke="url(#mark-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Pesos do haltere -->
  <rect x="10" y="26" width="6" height="12" rx="2" fill="url(#mark-grad)" filter="url(#mark-glow)"/>
  <rect x="48" y="26" width="6" height="12" rx="2" fill="url(#mark-grad)" filter="url(#mark-glow)"/>
  <rect x="15" y="22" width="4" height="20" rx="1.5" fill="url(#mark-grad)"/>
  <rect x="45" y="22" width="4" height="20" rx="1.5" fill="url(#mark-grad)"/>
  <!-- Pulso central  símbolo de vida -->
  <path d="M20 32h4l3-8 5 16 4-10 3 7h5" fill="none" stroke="url(#mark-fire)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
